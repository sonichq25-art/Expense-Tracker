<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker Pro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1d2671, #c33764);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.4s;
    }

    body.light {
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      color: rgb(0, 0, 0);
    }

    .container {
      width: 380px;
      padding: 20px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      color: white;
      animation: fadeIn 1s ease;
    }

    body.light .container {
      background: rgba(255,255,255,0.85);
      color: rgb(0, 0, 0);
    }

    h1 { text-align: center; margin-bottom: 10px; }

    .top-buttons {
      display: flex;
      gap: 5px;
    }

    .balance {
      text-align: center;
      margin: 10px 0;
      font-size: 22px;
      font-weight: bold;
    }

    .summary {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .summary div {
      width: 48%;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      background: rgba(255,255,255,0.2)
     
    }

    input, select, button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      transition: 0.3s;
    }

    input, select {
      background: rgba(255, 255, 255, 0.815);
      color: rgb(0, 0, 0);
    }

    body.light input, body.light select {
      background: white;
      color: black;
    }

   
button {
  position: relative;
  padding: 10px 20px;
  border-radius: 7px;
  border: 1px solid rgb(61, 106, 255);
  font-size: 14px;
  text-transform: uppercase;
  font-weight: 600;
  letter-spacing: 2px;
  background: transparent;
  color: #000000;
  overflow: hidden;
  box-shadow: 0 0 0 0 transparent;
  -webkit-transition: all 0.2s ease-in;
  -moz-transition: all 0.2s ease-in;
  transition: all 0.2s ease-in;
}

button:hover {
  background: rgb(61, 106, 255);
  box-shadow: 0 0 30px 5px rgba(0, 142, 236, 0.815);
  -webkit-transition: all 0.2s ease-out;
  -moz-transition: all 0.2s ease-out;
  transition: all 0.2s ease-out;
}

button:hover::before {
  -webkit-animation: sh02 0.5s 0s linear;
  -moz-animation: sh02 0.5s 0s linear;
  animation: sh02 0.5s 0s linear;
}

button::before {
  content: '';
  display: block;
  width: 0px;
  height: 86%;
  position: absolute;
  top: 7%;
  left: 0%;
  opacity: 0;
  background: #fff;
  box-shadow: 0 0 50px 30px #fff;
  -webkit-transform: skewX(-20deg);
  -moz-transform: skewX(-20deg);
  -ms-transform: skewX(-20deg);
  -o-transform: skewX(-20deg);
  transform: skewX(-20deg);
}

@keyframes sh02 {
  from {
    opacity: 0;
    left: 0%;
  }

  50% {
    opacity: 1;
  }

  to {
    opacity: 0;
    left: 100%;
  }
}

button:active {
  box-shadow: 0 0 0 0 transparent;
  -webkit-transition: box-shadow 0.2s ease-in;
  -moz-transition: box-shadow 0.2s ease-in;
  transition: box-shadow 0.2s ease-in;
}


    ul {
      list-style: none;
      margin-top: 10px;
      max-height: 220px;
      overflow-y: auto;
    }

    li {
      background: rgba(0, 0, 0, 0.2);
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideUp 0.3s ease;
    }

    .actions button {
      padding: 5px;
      font-size: 12px;
      margin-left: 3px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: scale(0.9);}
      to {opacity: 1; transform: scale(1);}
    }

    @keyframes slideUp {
      from {transform: translateY(20px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }
  </style>
</head>

<body>

<div class="container">
  <h1>💰 Expense Tracker</h1>

  <div class="top-buttons">
    <button onclick="toggleMode()" >🌙 Mode</button>
    <button onclick="exportPDF()">📄 PDF</button>
  </div>

  <div class="balance">Balance: LKR<span id="balance">0</span></div>

  <div class="summary">
    <div>Income<br>LKR<span id="income">0</span></div>
    <div>Expense<br>LKR<span id="expense">0</span></div>
  </div>

  <input type="text" id="search" placeholder="🔍 Search transactions">

  <form id="form">
    <input type="text" id="text" placeholder="Description" required>
    <input type="number" id="amount" placeholder="Amount (+income / -expense)" required>

    <select id="category">
      <option>Food</option>
      <option>Travel</option>
      <option>Bills</option>
      <option>Shopping</option>
      <option>income</option>
    </select>

    <button>Add Transaction</button>
  </form>

  <ul id="list"></ul>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
let editId = null;

const list = document.getElementById('list');

// ADD / EDIT
document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();

  const text = document.getElementById('text').value;
  const amount = +document.getElementById('amount').value;
  const category = document.getElementById('category').value;

  if (editId) {
    transactions = transactions.map(t =>
      t.id === editId ? { id: editId, text, amount, category } : t
    );
    editId = null;
  } else {
    transactions.push({ id: Date.now(), text, amount, category });
  }

  e.target.reset();
  updateUI();
});

// DELETE
function deleteTx(id) {
  transactions = transactions.filter(t => t.id !== id);
  updateUI();
}

// EDIT
function editTx(id) {
  const tx = transactions.find(t => t.id === id);
  document.getElementById('text').value = tx.text;
  document.getElementById('amount').value = tx.amount;
  document.getElementById('category').value = tx.category;
  editId = id;
}

// SEARCH
document.getElementById('search').addEventListener('input', e => {
  updateUI(e.target.value.toLowerCase());
});

// UPDATE UI
function updateUI(filter="") {
  list.innerHTML = "";

  let total=0, inc=0, exp=0;

  transactions
    .filter(t => t.text.toLowerCase().includes(filter))
    .forEach(t => {
      const li = document.createElement('li');

      const icon = t.amount > 0 ? "💰" : "💸";

      li.innerHTML = `
        ${icon} ${t.text} (${t.category}) : ${t.amount}
        <div class="actions">
          <button onclick="editTx(${t.id})">✏️</button>
          <button onclick="deleteTx(${t.id})">❌</button>
        </div>
      `;

      list.appendChild(li);

      total += t.amount;
      if (t.amount > 0) inc += t.amount;
      else exp += t.amount;
    });

  document.getElementById('balance').innerText = total;
  document.getElementById('income').innerText = inc;
  document.getElementById('expense').innerText = Math.abs(exp);

  localStorage.setItem('transactions', JSON.stringify(transactions));
}

// MODE
function toggleMode() {
  document.body.classList.toggle('light');
}

// PDF EXPORT (PREMIUM)
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 30;

  doc.setFontSize(18);
  doc.setTextColor(0,102,204);
  doc.text("Expense Tracker Pro", 10, 15);

  doc.setFontSize(10);
  doc.setTextColor(0,0,0);
  doc.text("Date: " + new Date().toLocaleDateString(), 150, 15);

  doc.line(10,20,200,20);

  doc.text("Type",10,y);
  doc.text("Description",25,y);
  doc.text("Category",110,y);
  doc.text("Amount",160,y);

  y+=8;

  let total=0, inc=0, exp=0;

  transactions.forEach(t=>{
    let icon = t.amount>0?"*":"*";

    if(t.amount>0){
      doc.setTextColor(0,150,0);
      inc+=t.amount;
    } else {
      doc.setTextColor(200,0,0);
      exp+=t.amount;
    }

    doc.text(icon,10,y);
    doc.text(t.text,25,y);
    doc.text(t.category,110,y);
    doc.text(t.amount.toString(),160,y);

    total+=t.amount;
    y+=8;

    if(y>260){
      doc.addPage();
      y=20;
    }
  });

  doc.setTextColor(0,0,0);
  y+=10;

  doc.text("Summary",10,y); y+=10;

  doc.text("Income: LKR"+inc,10,y); y+=8;
  doc.text("Expense: LKR"+Math.abs(exp),10,y); y+=8;
  doc.text("Balance: LKR"+total,10,y);

  doc.save("Your Expense Report.pdf");
}

updateUI();
</script>

</body>
</html>
